<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Threads運用ダッシュボード</title>
<style>
:root{
  --accent:#7b61ff; --accent-soft:#efeaff; --accent-2:#b8abff;
  --bg:#f4f3fa; --card:#ffffff; --ink:#1c1b29; --ink2:#6b6980; --ink3:#9d9bb0;
  --line:#eceaf4; --good:#16a06a; --good-bg:#e6f6ef; --bad:#e2544f; --bad-bg:#fdecec;
  --radius:16px; --shadow:0 1px 3px rgba(30,25,60,.05);
}
:root[data-theme=dark]{
  --accent:#8f7bff; --accent-soft:#2a2547; --accent-2:#5b4fa8;
  --bg:#141320; --card:#1e1c2e; --ink:#f0eefb; --ink2:#a6a3c0; --ink3:#75729a;
  --line:#2b2940; --good:#4cd196; --good-bg:#173a2c; --bad:#f0817d; --bad-bg:#3a1f1f;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  -webkit-font-smoothing:antialiased;padding:18px}
.wrap{max-width:1120px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
.logo{width:34px;height:34px;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:800}
.tabs{display:flex;gap:6px;background:var(--card);padding:5px;border-radius:12px;box-shadow:var(--shadow)}
.tab{border:0;background:transparent;color:var(--ink2);font-weight:600;font-size:14px;padding:8px 16px;border-radius:9px;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--accent);color:#fff}
.tools{display:flex;align-items:center;gap:8px}
.iconbtn{width:38px;height:38px;border-radius:10px;border:0;background:var(--card);color:var(--ink2);cursor:pointer;font-size:16px;box-shadow:var(--shadow)}
.hello{font-size:22px;font-weight:700;margin:2px 0 2px}
.sub{color:var(--ink2);font-size:13px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.cards4{grid-template-columns:repeat(4,1fr)}
.two{grid-template-columns:1.6fr 1fr}
.two2{grid-template-columns:1.6fr 1fr}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px}
.stat .lab{color:var(--ink2);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.stat .val{font-size:26px;font-weight:800;margin:8px 0 8px;letter-spacing:-.5px}
.stat .val small{font-size:14px;color:var(--ink3);font-weight:600}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px}
.badge.up{color:var(--good);background:var(--good-bg)}
.badge.down{color:var(--bad);background:var(--bad-bg)}
.badge.flat{color:var(--ink2);background:var(--line)}
.arrow{width:26px;height:26px;border-radius:8px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:13px}
.h{font-size:16px;font-weight:700;margin:0 0 2px}
.hsub{color:var(--ink3);font-size:12px}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.legend{display:flex;flex-direction:column;gap:9px;font-size:13px}
.legend .row{display:flex;align-items:center;gap:8px;color:var(--ink2)}
.dot{width:9px;height:9px;border-radius:50%}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--ink3);font-weight:600;font-size:11px;padding:8px 8px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 8px;border-bottom:1px solid var(--line);color:var(--ink)}
.tbl tr:last-child td{border-bottom:0}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}
.goal{margin-bottom:14px}
.goal .gt{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.goal .gt b{font-weight:700}
.bar{height:9px;border-radius:20px;background:var(--line);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:20px;background:var(--accent)}
.win{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.win:last-child{border-bottom:0}
.rank{width:22px;height:22px;border-radius:7px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:12px;font-weight:800}
.win .n{font-weight:600;font-size:14px;flex:1}
.win .m{color:var(--ink3);font-size:12px}
.fab{position:sticky;bottom:14px;margin-top:16px;display:flex;justify-content:center}
.fab button{border:0;background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:14px 26px;border-radius:14px;cursor:pointer;box-shadow:0 6px 18px rgba(123,97,255,.35)}
.sheet-bg{position:fixed;inset:0;background:rgba(20,15,40,.5);display:none;align-items:flex-end;justify-content:center;z-index:9}
.sheet-bg.on{display:flex}
.sheet{background:var(--card);width:100%;max-width:460px;border-radius:20px 20px 0 0;padding:20px 20px 26px}
.sheet h3{margin:0 0 4px;font-size:17px}
.sheet .note{color:var(--ink3);font-size:12px;margin-bottom:16px}
.field{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.field label{width:110px;font-size:14px;font-weight:600}
.field input{flex:1;height:44px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:11px;padding:0 14px;font-size:16px;text-align:right}
.field .prev{width:70px;color:var(--ink3);font-size:12px}
.sheet .save{width:100%;height:48px;border:0;background:var(--accent);color:#fff;font-weight:700;font-size:15px;border-radius:12px;cursor:pointer;margin-top:6px}
.empty{color:var(--ink3);font-size:13px;text-align:center;padding:26px 0}
@media(max-width:820px){.cards4{grid-template-columns:1fr 1fr}.two,.two2{grid-template-columns:1fr}}
@media(max-width:480px){.cards4{grid-template-columns:1fr 1fr}.hello{font-size:19px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><div class="logo">T</div>Threads運用</div>
    <div class="tabs" id="tabs"></div>
    <div class="tools">
      <button class="iconbtn" id="refresh" title="更新">⟳</button>
      <button class="iconbtn" id="theme" title="テーマ">☾</button>
    </div>
  </div>

  <div class="hello" id="hello">おかえりなさい</div>
  <div class="sub" id="sub">読み込み中…</div>

  <div class="grid cards4" id="stats" style="margin-bottom:14px"></div>

  <div class="grid two" style="margin-bottom:14px">
    <div class="card">
      <div class="head"><div><p class="h">インプレッション推移</p><span class="hsub" id="flowsub">直近の投稿</span></div></div>
      <div id="flow"></div>
    </div>
    <div class="card">
      <div class="head"><div><p class="h">今週の勝ち型</p><span class="hsub" id="winsub">型別の平均インプレ</span></div></div>
      <div id="wins"></div>
    </div>
  </div>

  <div class="grid two2">
    <div class="card">
      <div class="head"><div><p class="h">最近の投稿</p><span class="hsub">タップで数字を確認</span></div></div>
      <div id="recent"></div>
    </div>
    <div class="card">
      <div class="head"><div><p class="h">今月の目標</p><span class="hsub">進捗</span></div></div>
      <div id="goals"></div>
    </div>
  </div>

  <div class="fab"><button id="openInput">＋ 今日の数値を入力</button></div>
</div>

<div class="sheet-bg" id="sheetbg">
  <div class="sheet">
    <h3>今日の数値を入力</h3>
    <p class="note" id="sheetacct">この端末に保存されます</p>
    <div class="field"><label>オプチャ参加</label><input id="in_chat" inputmode="numeric" placeholder="0"><span class="prev" id="prev_chat"></span></div>
    <div class="field"><label>アポ / 相談</label><input id="in_appt" inputmode="numeric" placeholder="0"><span class="prev" id="prev_appt"></span></div>
    <button class="save" id="saveInput">保存（今日の日付）</button>
  </div>
</div>

<script>
const ACCOUNTS = {
  A: {name:"クラウドワークス裏側", handle:"@cw_uragawa", kpi2:"無料相談", url:"kpi_data_A.json"},
  B: {name:"駆け込み寺", handle:"@kakekomi_tera_", kpi2:"無料相談", url:"kpi_data_B.json"},
  C: {name:"AI生存スキル", handle:"@seizonnsukiru", kpi2:"アポ", url:"kpi_data_C.json"},
};
const GOAL_DEFAULT = {follower:150, posts:5, chat:100, appt:10};
const HOOK_TYPES = [
  {key:"権威開示", re:/(していたから|見てきた|担当をして|やってわかった|年やって|件見て)/},
  {key:"数字対比", re:/(\d+件|\d+\s*人|\d+%|\d+件中|100件|300件)/},
  {key:"未回収",   re:/(共通点|理由は|一番|ワースト|ランキング|だけです|逆です|、$)/},
  {key:"タイプ分類",re:/(タイプ|型|パターン|種類)/},
];
let CUR = "A";
let DATA = {};

const SAMPLE = { // 実データが空のときのデモ表示（本番でデータが入ると自動で消える）
  demo:true,
  generated_at:"サンプル",
  posts:[
    {date:"2026-07-17",hour:12,imp:412,likes:9,comments:2,content:"採用担当をしていたから言います。100件で読んだのは13件"},
    {date:"2026-07-18",hour:21,imp:880,likes:21,comments:5,content:"発注側が二度と依頼しない受注者の4タイプ"},
    {date:"2026-07-19",hour:20,imp:1204,likes:43,comments:8,content:"提案文300件見てきた発注側が言う落ちる共通点"},
    {date:"2026-07-20",hour:19,imp:660,likes:14,comments:3,content:"金額は相談で応募するな。後回しにされる理由"},
    {date:"2026-07-21",hour:21,imp:1530,likes:58,comments:12,content:"0円で途中終了を持ちかけられたときの一言"},
    {date:"2026-07-22",hour:12,imp:742,likes:19,comments:4,content:"単価が安い案件ほど発注側はヤバい人が多い"},
    {date:"2026-07-23",hour:12,imp:980,likes:27,comments:6,content:"リピートを決める瞬間は3つあります"},
    {date:"2026-07-23",hour:20,imp:1120,likes:34,comments:7,content:"提案文300件で返信したのは9件だけ"},
  ],
  followers:[
    {date:"2026-07-19",count:96},{date:"2026-07-20",count:104},{date:"2026-07-21",count:113},
    {date:"2026-07-22",count:122},{date:"2026-07-23",count:128},
  ],
};

const $ = s => document.querySelector(s);
const fmt = n => (n==null?"—":Number(n).toLocaleString());
const today = () => new Date().toISOString().slice(0,10);
const lsGet = (k,d) => {try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};
const lsSet = (k,v) => localStorage.setItem(k,JSON.stringify(v));

function classifyHook(text){
  for(const h of HOOK_TYPES){ if(h.re.test(text||"")) return h.key; }
  return "その他";
}

function buildTabs(){
  const t = $("#tabs"); t.innerHTML="";
  Object.keys(ACCOUNTS).forEach(k=>{
    const b=document.createElement("button");
    b.className="tab"+(k===CUR?" on":""); b.textContent=k+"："+ACCOUNTS[k].name;
    b.onclick=()=>{CUR=k;buildTabs();render();};
    t.appendChild(b);
  });
}

function manualEntries(acct){ return lsGet("uni_kpi_"+acct+"_manual", []); }
function goals(acct){ return Object.assign({}, GOAL_DEFAULT, lsGet("uni_kpi_"+acct+"_goals", {})); }

function statCard(lab,val,unit,badge){
  const b = badge ? `<span class="badge ${badge.cls}">${badge.txt}</span>` : "";
  return `<div class="card stat"><div class="lab">${lab}<span class="arrow">↗</span></div>
    <div class="val">${val}${unit?`<small> ${unit}</small>`:""}</div>${b}</div>`;
}

function render(){
  const a = ACCOUNTS[CUR];
  const d = DATA[CUR] || SAMPLE;
  const posts = (d.posts||[]).slice().sort((x,y)=>(x.date>y.date?1:-1));
  const isDemo = d===SAMPLE || d.demo;
  $("#hello").textContent = "おかえりなさい、"+a.name;
  $("#sub").innerHTML = a.handle+" ・ 更新 "+(d.generated_at||"—")+(isDemo?' ・ <b style="color:var(--accent)">サンプル表示（データ接続待ち）</b>':"");
  $("#sheetacct").textContent = a.name+"｜この端末に保存されます";

  // stats
  const tkey=today();
  const todayPosts = posts.filter(p=>(p.date||"").slice(0,10)===tkey).length;
  const g = goals(CUR);
  const imps = posts.filter(p=>p.imp!=null).map(p=>p.imp);
  const last7 = posts.slice(-7).filter(p=>p.imp!=null).map(p=>p.imp);
  const prev7 = posts.slice(-14,-7).filter(p=>p.imp!=null).map(p=>p.imp);
  const avg = arr => arr.length? Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):0;
  const a7=avg(last7), p7=avg(prev7);
  const impBadge = p7? (a7>=p7?{cls:"up",txt:"↑ "+Math.round((a7-p7)/p7*100)+"% 前週比"}:{cls:"down",txt:"↓ "+Math.round((p7-a7)/p7*100)+"% 前週比"}) : {cls:"flat",txt:"データ蓄積中"};
  const fol = d.followers||[];
  const folNow = fol.length?fol[fol.length-1].count:null;
  const folPrev = fol.length>1?fol[fol.length-2].count:null;
  const folBadge = (folNow!=null&&folPrev!=null)? (folNow>=folPrev?{cls:"up",txt:"↑ +"+(folNow-folPrev)+" 前日"}:{cls:"down",txt:"↓ "+(folNow-folPrev)+" 前日"}):{cls:"flat",txt:"—"};
  const man = manualEntries(CUR);
  const lastChat = [...man].reverse().find(e=>e.chat!=null);
  const chatVal = lastChat?lastChat.chat:null;

  $("#stats").innerHTML =
    statCard("今日の投稿", todayPosts, "/ "+g.posts, {cls: todayPosts>=g.posts?"up":"flat", txt: todayPosts>=g.posts?"達成":"あと"+(g.posts-todayPosts)+"件"}) +
    statCard("平均インプレ", fmt(a7), "", impBadge) +
    statCard("フォロワー", fmt(folNow), "人", folBadge) +
    statCard("オプチャ参加", fmt(chatVal), "人", {cls:"flat", txt: man.some(e=>e.date===tkey&&e.chat!=null)?"今日入力済":"今日未入力"});

  // flow bars
  const recent = posts.slice(-8);
  const maxImp = Math.max(1,...recent.map(p=>p.imp||0));
  $("#flowsub").textContent = "直近"+recent.length+"投稿";
  $("#flow").innerHTML = recent.length? `<div style="display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:8px">`+
    recent.map(p=>{
      const h=Math.max(6,Math.round((p.imp||0)/maxImp*150));
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="font-size:11px;color:var(--ink3);font-weight:600">${fmt(p.imp)}</div>
        <div style="width:60%;height:${h}px;background:linear-gradient(var(--accent),var(--accent-2));border-radius:8px 8px 4px 4px"></div>
        <div style="font-size:10px;color:var(--ink3)">${(p.date||"").slice(5)}</div>
      </div>`;
    }).join("")+`</div>` : `<div class="empty">投稿データがまだありません</div>`;

  // wins (hook types)
  const byType={};
  posts.filter(p=>p.imp!=null).forEach(p=>{const k=classifyHook(p.content);(byType[k]=byType[k]||[]).push(p.imp);});
  const winsArr=Object.entries(byType).map(([k,v])=>({k,avg:Math.round(v.reduce((s,x)=>s+x,0)/v.length),n:v.length}))
    .sort((x,y)=>y.avg-x.avg).slice(0,3);
  const totalN=posts.filter(p=>p.imp!=null).length;
  const tag = totalN<5?'<span class="pill" style="background:var(--line);color:var(--ink2)">暫定・データ少</span>':"";
  $("#winsub").innerHTML = "型別の平均インプレ "+tag;
  $("#wins").innerHTML = winsArr.length? winsArr.map((w,i)=>
    `<div class="win"><div class="rank">${i+1}</div><div class="n">${w.k}</div><div class="m">平均 ${fmt(w.avg)}｜${w.n}投稿</div></div>`
  ).join("") : `<div class="empty">分析するには投稿を増やしてください</div>`;

  // recent table（1投稿ごと・時刻と本文つき）
  const hhmm = p => (p.date||"").slice(5) + (p.hour!=null?` ${String(p.hour).padStart(2,"0")}:00`:"");
  $("#recent").innerHTML = posts.length? `<table class="tbl"><thead><tr><th>日時</th><th>内容</th><th style="text-align:right">インプレ</th><th style="text-align:right">いいね</th></tr></thead><tbody>`+
    posts.slice(-8).reverse().map(p=>`<tr>
      <td style="white-space:nowrap;color:var(--ink2)">${hhmm(p)}</td>
      <td><div style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(p.content||"（内容なし）")}</div><span class="pill" style="margin-top:3px;display:inline-block">${classifyHook(p.content)}</span></td>
      <td style="text-align:right;font-weight:600">${fmt(p.imp)}</td>
      <td style="text-align:right">${fmt(p.likes)}</td></tr>`).join("")+
    `</tbody></table>` : `<div class="empty">投稿がまだありません</div>`;

  // goals
  const apptMonth = man.filter(e=>e.date&&e.date.slice(0,7)===tkey.slice(0,7)).reduce((s,e)=>s+(Number(e.appt)||0),0);
  const goalRows=[
    {n:"フォロワー",c:folNow||0,g:g.follower,u:"人"},
    {n:"オプチャ参加",c:chatVal||0,g:g.chat,u:"人"},
    {n:a.kpi2,c:apptMonth,g:g.appt,u:"件"},
  ];
  $("#goals").innerHTML = goalRows.map(r=>{
    const pct=Math.min(100,Math.round((r.c/r.g)*100)||0);
    return `<div class="goal"><div class="gt"><span>${r.n}</span><b>${fmt(r.c)} / ${fmt(r.g)}${r.u}</b></div>
      <div class="bar"><i style="width:${pct}%"></i></div></div>`;
  }).join("");

  // sheet prev values
  const lastAppt=[...man].reverse().find(e=>e.appt!=null);
  $("#prev_chat").textContent = lastChat?("前回 "+lastChat.chat):"";
  $("#prev_appt").textContent = lastAppt?("前回 "+lastAppt.appt):"";
  $("#in_chat").value=""; $("#in_appt").value="";
}

async function load(){
  await Promise.all(Object.keys(ACCOUNTS).map(async k=>{
    try{
      const r=await fetch(ACCOUNTS[k].url+"?t="+Date.now(),{cache:"no-store"});
      if(r.ok){const j=await r.json(); if((j.posts||[]).length) DATA[k]=j;}
    }catch(e){}
  }));
  render();
}

// theme
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);$("#theme").textContent=t==="dark"?"☀":"☾";lsSet("uni_theme",t);}
applyTheme(lsGet("uni_theme","light"));
$("#theme").onclick=()=>applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
$("#refresh").onclick=load;

// input sheet
$("#openInput").onclick=()=>$("#sheetbg").classList.add("on");
$("#sheetbg").onclick=e=>{if(e.target===$("#sheetbg"))$("#sheetbg").classList.remove("on");};
$("#in_chat").addEventListener("keydown",e=>{if(e.key==="Enter")$("#in_appt").focus();});
$("#in_appt").addEventListener("keydown",e=>{if(e.key==="Enter")$("#saveInput").click();});
$("#saveInput").onclick=()=>{
  const chat=$("#in_chat").value.trim(), appt=$("#in_appt").value.trim();
  if(chat===""&&appt==="")return $("#sheetbg").classList.remove("on");
  const man=manualEntries(CUR); const t=today();
  let row=man.find(e=>e.date===t); if(!row){row={date:t};man.push(row);}
  if(chat!=="")row.chat=chat.startsWith("+")?(Number(row.chat||0)+Number(chat.slice(1))):Number(chat);
  if(appt!=="")row.appt=Number(appt);
  lsSet("uni_kpi_"+CUR+"_manual",man);
  $("#sheetbg").classList.remove("on"); render();
};

buildTabs(); render(); load();
</script>
</body>
</html>
